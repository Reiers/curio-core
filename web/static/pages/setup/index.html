<!doctype html>
<!--
  curio-core · first-run setup placeholder.

  The live /setup form is rendered by `internal/setupweb`, served
  directly from `curio-core run` over its own HTTP listener. This
  static file is a fallback for the day the web/ package's
  //go:build cgo shim is lifted (Day 6) and the gorilla/mux router
  starts serving web/static/ again.

  Until then, hitting /setup goes through internal/setupweb, not
  this file.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>curio-core · first-run setup</title>
</head>
<body>
  <h1>curio-core first-run setup</h1>
  <p>This is a static placeholder. The live setup form lives at
     <code>/setup</code>, served by the curio-core daemon
     directly.</p>
  <form method="POST" action="/api/setup">
    <p><label>Market address:
      <input type="text" name="market_address" required></label></p>
    <p><label>Wallet address:
      <input type="text" name="wallet_address" required></label></p>
    <p><label>Miner ID:
      <input type="text" name="miner_id" required></label></p>
    <p><button type="submit">Save and continue</button></p>
  </form>
</body>
</html>
